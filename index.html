<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>造景贴纸收藏册</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap');

  :root {
    --cream: #F7F3EC;
    --cream-dark: #EDE7DA;
    --moss: #3D5A44;
    --moss-light: #5C7D63;
    --moss-pale: #C8D9CA;
    --bark: #7A5C3A;
    --bark-light: #C4956A;
    --paper: #FDFAF5;
    --ink: #2A2118;
    --ink-soft: #5A4E3C;
    --sun: #F5C842;
    --sun-pale: #FBF0C0;
    --rust: #C0543A;
    --sky: #4A7FA5;
    --sky-pale: #D4E8F5;
    --shadow: rgba(60,40,20,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'Noto Sans SC', sans-serif;
    min-height: 100vh;
    background-image:
      radial-gradient(circle at 15% 20%, rgba(93,125,99,0.06) 0%, transparent 50%),
      radial-gradient(circle at 85% 80%, rgba(122,92,58,0.05) 0%, transparent 50%);
  }

  /* ── HEADER ── */
  .header {
    background: var(--moss);
    padding: 20px 28px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    box-shadow: 0 3px 12px rgba(30,50,35,0.25);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .header-icon { font-size: 28px; line-height: 1; }
  .header-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--cream);
    letter-spacing: 0.05em;
  }
  .header-sub {
    font-size: 11px;
    color: var(--moss-pale);
    margin-top: 2px;
    letter-spacing: 0.08em;
  }
  .header-actions { display: flex; gap: 8px; align-items: center; }

  .btn {
    border: none;
    border-radius: 6px;
    padding: 7px 14px;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 500;
    white-space: nowrap;
  }
  .btn-ghost {
    background: rgba(255,255,255,0.12);
    color: var(--cream);
    border: 1px solid rgba(255,255,255,0.22);
  }
  .btn-ghost:hover { background: rgba(255,255,255,0.22); }
  .btn-sun {
    background: var(--sun);
    color: var(--ink);
  }
  .btn-sun:hover { background: #e8bc30; }
  .btn-moss {
    background: var(--moss);
    color: white;
    border: 1px solid var(--moss-light);
  }
  .btn-moss:hover { background: var(--moss-light); }
  .btn-danger { background: #fdecea; color: var(--rust); border: 1px solid #f5c6c0; }
  .btn-danger:hover { background: #fad5d0; }
  .btn-sm { padding: 5px 10px; font-size: 11px; }

  /* ── SYNC STATUS ── */
  .sync-bar {
    background: var(--cream-dark);
    border-bottom: 1px solid rgba(0,0,0,0.07);
    padding: 8px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11.5px;
    color: var(--ink-soft);
    gap: 12px;
    flex-wrap: wrap;
  }
  .sync-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
  }
  .dot-ok { background: #4CAF50; }
  .dot-warn { background: var(--sun); }
  .dot-err { background: var(--rust); }
  .dot-idle { background: #aaa; }

  /* ── TOOLBAR ── */
  .toolbar {
    padding: 16px 28px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .search-box {
    flex: 1;
    min-width: 180px;
    max-width: 320px;
    position: relative;
  }
  .search-box input {
    width: 100%;
    padding: 8px 12px 8px 32px;
    border: 1.5px solid var(--moss-pale);
    border-radius: 8px;
    background: var(--paper);
    font-size: 13px;
    font-family: 'Noto Sans SC', sans-serif;
    color: var(--ink);
    outline: none;
    transition: border 0.15s;
  }
  .search-box input:focus { border-color: var(--moss-light); }
  .search-box::before {
    content: '🔍';
    position: absolute;
    left: 9px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 13px;
  }
  .filter-select {
    padding: 8px 10px;
    border: 1.5px solid var(--moss-pale);
    border-radius: 8px;
    background: var(--paper);
    font-size: 12px;
    font-family: 'Noto Sans SC', sans-serif;
    color: var(--ink);
    outline: none;
    cursor: pointer;
  }
  .count-badge {
    margin-left: auto;
    font-size: 12px;
    color: var(--ink-soft);
    background: var(--moss-pale);
    padding: 4px 10px;
    border-radius: 12px;
  }

  /* ── STATS ROW ── */
  .stats-row {
    padding: 0 28px 16px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .stat-chip {
    background: var(--paper);
    border: 1.5px solid var(--cream-dark);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 12px;
    color: var(--ink-soft);
  }
  .stat-chip strong {
    display: block;
    font-size: 18px;
    font-weight: 700;
    font-family: 'Noto Serif SC', serif;
    color: var(--ink);
  }

  /* ── GRID ── */
  .grid {
    padding: 0 28px 40px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }

  /* ── STICKER CARD ── */
  .card {
    background: var(--paper);
    border-radius: 14px;
    box-shadow: 0 2px 10px var(--shadow);
    padding: 18px 18px 14px;
    position: relative;
    transition: transform 0.15s, box-shadow 0.15s;
    border: 1.5px solid rgba(0,0,0,0.05);
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--moss), var(--bark-light));
    border-radius: 14px 14px 0 0;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--shadow); }

  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
  .card-brand {
    font-family: 'Noto Serif SC', serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--moss);
    line-height: 1.3;
  }
  .card-version {
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 2px;
  }

  .status-badge {
    flex-shrink: 0;
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    white-space: nowrap;
  }
  .status-wishlist { background: #F3E8FF; color: #7C3AAB; }
  .status-pending { background: #F0EDE8; color: var(--ink-soft); }
  .status-ordered { background: var(--sky-pale); color: #2A5F82; }
  .status-transit { background: var(--sun-pale); color: #8A6800; }
  .status-arrived { background: #D4F1DA; color: #2E7D42; }
  .status-using { background: #FFE8D6; color: #B84A00; }
  .status-done { background: #E8E4F8; color: #3D2E7D; }

  .card-meta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px 12px;
    margin-bottom: 12px;
  }
  .meta-item { font-size: 11.5px; }
  .meta-label { color: var(--bark-light); font-size: 10px; letter-spacing: 0.05em; margin-bottom: 1px; }
  .meta-value { color: var(--ink); font-weight: 500; }
  .meta-price { color: var(--bark); font-weight: 700; font-size: 13px; }

  .card-note {
    font-size: 11.5px;
    color: var(--ink-soft);
    background: var(--cream);
    border-radius: 6px;
    padding: 6px 9px;
    margin-bottom: 10px;
    font-style: italic;
    border-left: 2px solid var(--moss-pale);
  }

  .card-actions { display: flex; gap: 6px; justify-content: flex-end; margin-top: 10px; flex-wrap: wrap; }
  .btn-next { background: var(--sun); color: var(--ink); font-weight: 600; }
  .btn-next:hover { background: #e8bc30; }

  /* ── EMPTY STATE ── */
  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-soft);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty p { font-size: 14px; }

  /* ── MODAL ── */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(30,25,15,0.55);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .overlay.open { display: flex; }

  .modal {
    background: var(--paper);
    border-radius: 16px;
    padding: 28px;
    width: 100%;
    max-width: 460px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--moss);
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1.5px solid var(--cream-dark);
  }

  .form-group { margin-bottom: 14px; }
  .form-label {
    display: block;
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 5px;
    font-weight: 500;
  }
  .form-input, .form-select, .form-textarea {
    width: 100%;
    padding: 9px 12px;
    border: 1.5px solid var(--cream-dark);
    border-radius: 8px;
    background: var(--cream);
    font-size: 13px;
    font-family: 'Noto Sans SC', sans-serif;
    color: var(--ink);
    outline: none;
    transition: border 0.15s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--moss-light);
    background: var(--paper);
  }
  .form-textarea { resize: vertical; min-height: 70px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 20px;
    padding-top: 14px;
    border-top: 1.5px solid var(--cream-dark);
  }

  /* ── GITHUB SETTINGS MODAL ── */
  .settings-section { margin-bottom: 18px; }
  .settings-section h3 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--moss-light);
    margin-bottom: 10px;
    font-weight: 600;
  }

  /* ── TOAST ── */
  .toast-container {
    position: fixed;
    bottom: 24px; right: 24px;
    z-index: 999;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .toast {
    background: var(--ink);
    color: var(--cream);
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 13px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.25);
    animation: slideIn 0.2s ease;
    max-width: 280px;
  }
  .toast.success { background: var(--moss); }
  .toast.error { background: var(--rust); }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── BRAND GROUP ── */
  .brand-group-header {
    grid-column: 1 / -1;
    font-family: 'Noto Serif SC', serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--moss);
    padding: 8px 4px 4px;
    border-bottom: 2px solid var(--moss-pale);
    margin-bottom: 2px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    letter-spacing: 0.03em;
  }
  .brand-group-header:hover { color: var(--moss-light); }
  .brand-count {
    background: var(--moss-pale);
    color: var(--moss);
    font-size: 11px;
    font-weight: 500;
    padding: 1px 7px;
    border-radius: 10px;
    font-family: 'Noto Sans SC', sans-serif;
  }


  /* ── TABS ── */
  .tab-nav {
    background: var(--moss);
    display: flex;
    gap: 0;
    padding: 0 28px;
    border-top: 1px solid rgba(255,255,255,0.10);
  }
  .tab-btn {
    background: none;
    border: none;
    color: rgba(255,255,255,0.55);
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 10px 18px;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .tab-btn:hover { color: rgba(255,255,255,0.85); }
  .tab-btn.active { color: #fff; border-bottom-color: var(--sun); }
  .tab-page { display: none; }
  .tab-page.active { display: block; }

  /* ── SHIPMENT PAGE ── */
  .shipment-toolbar {
    padding: 16px 28px 12px;
    display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
  }
  .shipment-grid {
    padding: 0 28px 40px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .shipment-card {
    background: var(--paper);
    border-radius: 14px;
    box-shadow: 0 2px 10px var(--shadow);
    border: 1.5px solid rgba(0,0,0,0.05);
    overflow: hidden;
  }
  .shipment-card::before {
    content: '';
    display: block;
    height: 4px;
    background: linear-gradient(90deg, var(--sky), var(--moss-light));
  }
  .shipment-head {
    padding: 14px 18px 10px;
    display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
  }
  .shipment-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 15px; font-weight: 700; color: var(--sky);
  }
  .shipment-sub { font-size: 11.5px; color: var(--ink-soft); margin-top:3px; }
  .shipment-meta {
    padding: 0 18px 10px;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(140px,1fr)); gap: 6px 16px;
  }
  .shipment-items {
    margin: 0 18px 12px;
    border-radius: 8px;
    overflow: hidden;
    border: 1.5px solid var(--cream-dark);
  }
  .shipment-item-row {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 12px;
    font-size: 12px;
    border-bottom: 1px solid var(--cream-dark);
  }
  .shipment-item-row:last-child { border-bottom: none; }
  .shipment-item-row:nth-child(even) { background: var(--cream); }
  .sitem-brand { font-weight: 600; color: var(--moss); min-width: 80px; }
  .sitem-version { color: var(--ink-soft); flex: 1; }
  .shipment-actions { padding: 0 18px 14px; display: flex; gap: 6px; justify-content: flex-end; }

  /* select mode on cards */
  .card.selectable { cursor: pointer; }
  .card.selectable:hover { outline: 2px solid var(--moss-pale); }
  .card.selected { outline: 2px solid var(--moss); background: #f0f7f1; }
  .select-checkbox {
    position: absolute; top: 14px; left: 14px;
    width: 18px; height: 18px; accent-color: var(--moss);
  }

  /* ── MANAGE ── */
  .mg-item {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--cream); border-radius: 7px;
    padding: 7px 10px; font-size: 13px; color: var(--ink);
  }
  .mg-del {
    background: none; border: none; color: #ccc; cursor: pointer;
    font-size: 16px; line-height: 1; padding: 0 2px;
    transition: color 0.12s;
  }
  .mg-del:hover { color: var(--rust); }

  /* ── REPORT ── */
  .report-brand-block { margin-bottom: 28px; }
  .report-brand-hd {
    font-family: 'Noto Serif SC', serif;
    font-size: 15px; font-weight: 700; color: var(--moss);
    padding: 8px 4px 6px;
    border-bottom: 2px solid var(--moss-pale);
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 10px;
  }
  .report-brand-hd .rbd-total {
    margin-left: auto; font-size: 12px; font-weight: 500;
    color: var(--bark); font-family: 'Noto Sans SC', sans-serif;
  }
  .report-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .report-table th {
    background: var(--cream-dark); padding: 7px 12px;
    text-align: left; font-weight: 600; color: var(--ink-soft);
    font-size: 11px; letter-spacing: 0.04em;
    position: sticky; top: 0;
  }
  .report-table th:last-child, .report-table td:last-child { text-align: right; }
  .report-table td { padding: 8px 12px; border-bottom: 1px solid var(--cream-dark); color: var(--ink); }
  .report-table tr:last-child td { border-bottom: none; }
  .report-table tr:nth-child(even) td { background: var(--cream); }
  .report-table .td-ver { color: var(--ink-soft); }
  .report-table .td-price { color: var(--ink-soft); font-size: 11px; }
  .report-table .td-ship { color: var(--sky); font-size: 11px; }
  .report-table .td-total { font-weight: 700; color: var(--bark); }
  .report-table .td-cny { font-size: 10px; color: #aaa; display: block; }
  .report-table-wrap { background: var(--paper); border-radius: 10px; box-shadow: 0 2px 10px var(--shadow); overflow: hidden; border: 1.5px solid rgba(0,0,0,0.05); margin-bottom: 6px; }
  .report-summary { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--cream-dark); }
  ::-webkit-scrollbar-thumb { background: var(--moss-pale); border-radius: 3px; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="header-icon">🌿</div>
    <div>
      <div class="header-title">造景贴纸收藏册</div>
      <div class="header-sub">TERRARIUM STICKER COLLECTION</div>
    </div>
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost" onclick="openSettings()">⚙ 设置</button>
    <button class="btn btn-ghost" onclick="syncFromGitHub()">↓ 拉取</button>
    <button class="btn btn-ghost" onclick="syncToGitHub()">↑ 保存</button>
    <button class="btn btn-ghost" onclick="openBundleModal()">📦 捆绑</button>
    <button class="btn btn-sun" onclick="openAddModal()">＋ 添加</button>
  </div>
</div>

<!-- TAB NAV -->
<div class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('stickers')">🌿 贴纸收藏</button>
  <button class="tab-btn" onclick="switchTab('shipments')">🚚 集运管理</button>
  <button class="tab-btn" onclick="switchTab('report')">📊 费用报告</button>
  <button class="tab-btn" onclick="switchTab('manage')">⚙ 管理</button>
</div>

<!-- SYNC BAR -->
<div id="tab-stickers" class="tab-page active">
<div class="sync-bar">
  <div>
    <span class="sync-dot dot-idle" id="syncDot"></span>
    <span id="syncStatus">未连接 GitHub</span>
  </div>
  <div style="display:flex;align-items:center;gap:16px"><span id="pagesLinkBar" style="display:none"></span><span id="lastSync" style="color:#999">—</span></div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="搜索品牌、版本…" oninput="renderGrid()">
  </div>
  <select class="filter-select" id="filterStatus" onchange="renderGrid()">
    <option value="">全部状态</option>
    <option value="wishlist">心愿款</option>
    <option value="ordered">已下单</option>
    <option value="transit">运输中</option>
    <option value="arrived">已到货</option>
    <option value="using">贴中</option>
    <option value="done">贴完</option>
  </select>
  <select class="filter-select" id="filterBrand" onchange="renderGrid()">
    <option value="">全部品牌</option>
  </select>
  <select class="filter-select" id="filterPlatform" onchange="renderGrid()">
    <option value="">全部平台</option>
  </select>
  <div class="count-badge" id="countBadge">0 件</div>
</div>

<!-- STATS -->
<div class="stats-row" id="statsRow"></div>

<!-- GRID -->
<div class="grid" id="grid"></div>
</div><!-- /tab-stickers -->

<!-- SHIPMENT PAGE -->
<div id="tab-shipments" class="tab-page">
<div class="shipment-toolbar">
  <button class="btn btn-moss" onclick="openNewShipment()">＋ 新建集运单</button>
  <button class="btn btn-ghost" id="btnMergeShip" onclick="openMergeShipment()" style="display:none">📦 合并选中</button>
  <button class="btn btn-ghost" id="btnSelectMode" onclick="toggleSelectMode()">☑ 选择贴纸</button>
  <div class="count-badge" id="shipSelectCount" style="display:none">已选 0 件</div>
</div>
<div class="shipment-grid" id="shipmentGrid"></div>
</div><!-- /tab-shipments -->

<!-- REPORT PAGE -->
<div id="tab-report" class="tab-page">
  <div style="padding:16px 28px 10px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">

<script>
// ── STATE ──────────────────────────────────────
let entries = [];
let editingId = null;
let settings = {
  owner: 'fhebeozy-cpu',
  repo: 'sticker-collection',
  path: 'data/stickers.json',
  token: '',
  pagesUrl: ''
};
let githubSHA = null;
let autoSaveTimer = null;

// ── INIT ───────────────────────────────────────
function init() {
  const saved = localStorage.getItem('sticker_settings');
  if (saved) settings = { ...settings, ...JSON.parse(saved) };
  const local = localStorage.getItem('sticker_entries');
  if (local) entries = JSON.parse(local);
  const localShip = localStorage.getItem('sticker_shipments');
  if (localShip) shipments = JSON.parse(localShip);
  loadMgLists();
  updateSyncStatus('idle', '本地数据已加载');
  renderPagesLink();
  renderGrid();
  renderStats();
  renderPlatformFilter();
  renderBrandFilter();
  // Auto-pull on load if token configured
  if (settings.token && settings.owner && settings.repo) {
    syncFromGitHub();
  }
}

// ── STATUS LABELS ──────────────────────────────
const STATUS_LABEL = { wishlist:'心愿款', ordered:'已下单', transit:'运输中', arrived:'已到货', using:'贴中', done:'贴完' };
const STATUS_CLASS = { wishlist:'status-wishlist', ordered:'status-ordered', transit:'status-transit', arrived:'status-arrived', using:'status-using', done:'status-done' };
const STATUS_NEXT  = { wishlist:'ordered', ordered:'transit', transit:'arrived', arrived:'using', using:'done' };
const STATUS_NEXT_LABEL = { wishlist:'→ 已下单', ordered:'→ 运输中', transit:'→ 已到货', arrived:'→ 贴中', using:'→ 贴完' };

// ── RENDER ─────────────────────────────────────
function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const st = document.getElementById('filterStatus').value;
  const pl = document.getElementById('filterPlatform').value;
  const br = document.getElementById('filterBrand').value;
  return entries.filter(e => {
    const matchQ = !q || [e.brand, e.version, e.platform, e.note].some(f => f && f.toLowerCase().includes(q));
    const matchSt = !st || e.status === st;
    const matchPl = !pl || e.platform === pl;
    const matchBr = !br || e.brand === br;
    return matchQ && matchSt && matchPl && matchBr;
  });
}

function renderGrid() {
  const filtered = getFiltered();
  const grid = document.getElementById('grid');
  document.getElementById('countBadge').textContent = filtered.length + ' 件';

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">🌱</div><p>${entries.length===0?'还没有记录，点击右上角"＋ 添加"开始收藏！':'没有符合筛选条件的贴纸'}</p></div>`;
    return;
  }

  // Group by brand
  const activeBrand = document.getElementById('filterBrand').value;
  if (!activeBrand) {
    const grouped = {};
    filtered.forEach(e => {
      const b = e.brand || '未知品牌';
      if (!grouped[b]) grouped[b] = [];
      grouped[b].push(e);
    });
    let html = '';
    Object.keys(grouped).sort().forEach(brand => {
      html += `<div class="brand-group-header" onclick="setBrandFilter('${esc(brand)}')">${esc(brand)} <span class="brand-count">${grouped[brand].length}</span></div>`;
      grouped[brand].forEach(e => { html += renderCard(e); });
    });
    grid.innerHTML = html;
  } else {
    grid.innerHTML = filtered.map(e => renderCard(e)).join('');
  }
}

function renderCard(e) {
  return `
    <div class="card${selectMode ? ' selectable' + (selectedEntryIds.has(e.id) ? ' selected' : '') : ''}" data-eid="${e.id}">
      <div class="card-top">
        <div>
          <div class="card-brand">${esc(e.brand)}</div>
          <div class="card-version">${esc(e.version)}</div>
        </div>
        <span class="status-badge ${STATUS_CLASS[e.status]||'status-pending'}">${STATUS_LABEL[e.status]||e.status}</span>
      </div>
      <div class="card-meta">
        <div class="meta-item">
          <div class="meta-label">💰 价格</div>
          <div class="meta-price">${e.setPrice && e.qty > 1
            ? e.currency + ' ' + parseFloat(e.setPrice).toFixed(2) + `<span style="font-size:10px;font-weight:400;color:var(--ink-soft);margin-left:4px">/ ${e.qty}张 = ${e.currency} ${parseFloat(e.price).toFixed(2)}/张</span>`
            : e.price ? e.currency + ' ' + parseFloat(e.price).toFixed(2) : '—'}${e.bundleTotal && e.bundleCount ? `<span style="font-size:10px;font-weight:400;color:var(--ink-soft);margin-left:4px">（捆绑均摊 / 共${e.bundleCount}张）</span>` : ''}</div>
        </div>
        <div class="meta-item">
          <div class="meta-label">🛒 购买平台</div>
          <div class="meta-value">${esc(e.platform)||'—'}</div>
        </div>
        <div class="meta-item" style="grid-column:1/-1">
          <div class="meta-label">📅 记录日期</div>
          <div class="meta-value">${e.date||'—'}</div>
        </div>
      </div>
      ${e.note ? `<div class="card-note">${esc(e.note)}</div>` : ''}
      <div class="card-actions">
        ${e.link ? `<a href="${esc(e.link)}" target="_blank" class="btn btn-ghost btn-sm" style="color:var(--sky);border-color:var(--sky-pale);text-decoration:none">🔗 链接</a>` : ''}
        ${STATUS_NEXT[e.status] ? `<button class="btn btn-next btn-sm" data-action="next" data-id="${e.id}">${STATUS_NEXT_LABEL[e.status]}</button>` : ''}
        <button class="btn btn-moss btn-sm" data-action="edit" data-id="${e.id}">✏ 编辑</button>
        <button class="btn btn-danger btn-sm" data-action="delete" data-id="${e.id}">删除</button>
      </div>
    </div>
  `;
}

function renderStats() {
  const total = entries.filter(e => e.status !== 'wishlist').length;
  const wishlist = entries.filter(e => e.status === 'wishlist').length;
  const arrived = entries.filter(e => e.status === 'arrived').length;
  const transit = entries.filter(e => e.status === 'transit').length;
  const using = entries.filter(e => e.status === 'using').length;
  const done = entries.filter(e => e.status === 'done').length;
  const spentRM = entries.filter(e => e.price && e.currency === 'RM' && e.status !== 'wishlist').reduce((s,e) => s + parseFloat(e.price), 0);
  const spentCNY = entries.filter(e => e.price && e.currency === '¥' && e.status !== 'wishlist').reduce((s,e) => s + parseFloat(e.price), 0);
  const rate = parseFloat(localStorage.getItem('cny_to_rm') || '0.65');
  const totalRM = spentRM + spentCNY * rate;

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-chip"><strong>${total}</strong>拥有总数</div>
    ${wishlist > 0 ? `<div class="stat-chip"><strong style="color:#7C3AAB">${wishlist}</strong>心愿款</div>` : ''}
    <div class="stat-chip"><strong style="color:#2E7D42">${arrived}</strong>已到货</div>
    ${transit > 0 ? `<div class="stat-chip"><strong style="color:#8A6800">${transit}</strong>运输中</div>` : ''}
    ${using > 0 ? `<div class="stat-chip"><strong style="color:#B84A00">${using}</strong>贴中</div>` : ''}
    ${done > 0 ? `<div class="stat-chip"><strong style="color:#3D2E7D">${done}</strong>贴完</div>` : ''}
    ${(spentRM > 0 || spentCNY > 0) ? `<div class="stat-chip">
      <strong style="color:var(--bark)">RM ${totalRM.toFixed(2)}</strong>总支出
      <div style="font-size:10px;color:var(--ink-soft);margin-top:2px;line-height:1.6">
        ${spentRM > 0 ? `RM ${spentRM.toFixed(2)}` : ''}${spentRM > 0 && spentCNY > 0 ? ' + ' : ''}${spentCNY > 0 ? `¥ ${spentCNY.toFixed(2)}` : ''}
        <span style="color:#bbb;margin-left:4px;cursor:pointer" onclick="changeRate()" title="点击修改汇率">汇率 ${rate}</span>
      </div>
    </div>` : ''}
  `;
}

function renderPlatformFilter() {
  const platforms = [...new Set(entries.map(e => e.platform).filter(Boolean))];
  const sel = document.getElementById('filterPlatform');
  const cur = sel.value;
  sel.innerHTML = '<option value="">全部平台</option>' + platforms.map(p => `<option value="${esc(p)}">${esc(p)}</option>`).join('');
  sel.value = cur;
}

function renderBrandFilter() {
  const brands = [...new Set(entries.map(e => e.brand).filter(Boolean))].sort();
  const sel = document.getElementById('filterBrand');
  const cur = sel.value;
  sel.innerHTML = '<option value="">全部品牌</option>' + brands.map(b => `<option value="${esc(b)}">${esc(b)}</option>`).join('');
  sel.value = cur;
}

function setBrandFilter(brand) {
  document.getElementById('filterBrand').value = brand;
  renderGrid();
}

// ── CRUD ───────────────────────────────────────
function openAddModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = '添加新贴纸';
  ['fVersion','fPrice','fLink','fNote','fQty'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fBrand').value = '';
  document.getElementById('fCurrency').value = 'RM';
  document.getElementById('fStatus').value = 'wishlist';
  document.getElementById('fPlatform').value = '';
  document.getElementById('editOverlay').classList.add('open');
}

function openEditModal(id) {
  editingId = id;
  const e = entries.find(x => x.id === id);
  if (!e) return;
  document.getElementById('modalTitle').textContent = '编辑贴纸';
  // ensure brand exists in list
  if (e.brand && !mgBrands.includes(e.brand)) { mgBrands.push(e.brand); saveMgList('brand'); refreshSelectOptions(); }
  document.getElementById('fBrand').value = e.brand || '';
  document.getElementById('fVersion').value = e.version;
  document.getElementById('fCurrency').value = e.currency || 'RM';
  document.getElementById('fPlatform').value = e.platform || '';
  document.getElementById('fStatus').value = e.status;
  document.getElementById('fLink').value = e.link || '';
  document.getElementById('fNote').value = e.note || '';
  document.getElementById('fPrice').value = e.setPrice || e.price || '';
  document.getElementById('fQty').value = e.qty > 1 ? e.qty : '';

// ── GITHUB SYNC ────────────────────────────────
async function syncFromGitHub() {
  if (!settings.token || !settings.owner) { openSettings(); return; }
  updateSyncStatus('idle', '正在从 GitHub 拉取…');
  try {
    const url = `https://api.github.com/repos/${settings.owner}/${settings.repo}/contents/${settings.path}`;
    const res = await fetch(url, {
      headers: {
        'Authorization': `token ${settings.token}`,
        'Accept': 'application/vnd.github.v3+json'
      }
    });
    if (res.status === 404) {
      updateSyncStatus('ok', '文件不存在，将在保存时创建');
      toast('文件不存在，可直接添加后保存');
      return;
    }
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    githubSHA = data.sha;
    const b64 = data.content.replace(/\n/g,'');
    const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    const decoded = new TextDecoder('utf-8').decode(bytes);
    const content = JSON.parse(decoded);
    if (Array.isArray(content)) {
      entries = content; // legacy format
    } else {
      entries = content.entries || [];
      shipments = content.shipments || [];
    }
    saveLocal();
    renderGrid();
    renderStats();
    renderPlatformFilter();
  renderBrandFilter();
    updateSyncStatus('ok', `已同步 · ${new Date().toLocaleString('zh-CN')}`);
    document.getElementById('lastSync').textContent = `上次同步：${new Date().toLocaleTimeString('zh-CN')}`;
    toast('拉取成功 ✓', 'success');
    // Clear unsaved indicator after pull
    localStorage.setItem('sticker_entries', JSON.stringify(entries));
  } catch(e) {
    updateSyncStatus('err', '拉取失败：' + e.message);
    toast('拉取失败：' + e.message, 'error');
  }
}

async function syncToGitHub() {
  if (!settings.token || !settings.owner) { openSettings(); return; }
  updateSyncStatus('idle', '正在保存到 GitHub…');
  try {
    const url = `https://api.github.com/repos/${settings.owner}/${settings.repo}/contents/${settings.path}`;
    const json = JSON.stringify({ entries, shipments }, null, 2);
    const bytes2 = new TextEncoder().encode(json);
    const b64out = btoa(String.fromCharCode(...bytes2));
    const content = b64out;

    // Get current SHA if we don't have it
    if (!githubSHA) {
      const check = await fetch(url, {
        headers: { 'Authorization': `token ${settings.token}`, 'Accept': 'application/vnd.github.v3+json' }
      });
      if (check.ok) {
        const d = await check.json();
        githubSHA = d.sha;
      }
    }

    const body = {
      message: `更新贴纸记录 ${new Date().toLocaleString('zh-CN')}`,
      content,
      ...(githubSHA ? { sha: githubSHA } : {})
    };

    const res = await fetch(url, {
      method: 'PUT',
      headers: {
        'Authorization': `token ${settings.token}`,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.message || `HTTP ${res.status}`);
    }

    const result = await res.json();
    githubSHA = result.content.sha;
    updateSyncStatus('ok', `已保存 · ${new Date().toLocaleString('zh-CN')}`);
    document.getElementById('lastSync').textContent = `上次保存：${new Date().toLocaleTimeString('zh-CN')}`;
    toast('保存成功 ✓', 'success');
  } catch(e) {
    updateSyncStatus('err', '保存失败：' + e.message);
    toast('保存失败：' + e.message, 'error');
  }
}

// ── REPORT ─────────────────────────────────────
function getShipFeePerEntry() {
  // returns map: entryId -> feeRM allocated
  const map = {};
  shipments.forEach(s => {
    if (!s.entryIds || !s.entryIds.length) return;
    const feeRM = toRM(s.fee, s.feeCur || 'RM');
    if (!feeRM) return;
    const perItem = feeRM / s.entryIds.length;
    s.entryIds.forEach(eid => {
      map[eid] = (map[eid] || 0) + perItem;
    });
  });
  return map;
}

function renderReport() {
  const rate = parseFloat(localStorage.getItem('cny_to_rm') || '0.65');
  const feeMap = getShipFeePerEntry();
  const el = document.getElementById('reportContent');

  const relevant = entries.filter(e => e.status !== 'wishlist');
  if (!relevant.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📊</div><p>还没有贴纸记录</p></div>';
    return;
  }

  // group by brand
  const brands = {};
  relevant.forEach(e => {
    const b = e.brand || '未知品牌';
    if (!brands[b]) brands[b] = [];
    brands[b].push(e);
  });

  // overall summary
  let grandRM = 0;
  let grandCNY = 0;
  relevant.forEach(e => {
    const fee = feeMap[e.id] || 0;
    const itemRM = toRM(e.price, e.currency);
    grandRM += itemRM + fee;
    if (e.currency === '¥') grandCNY += parseFloat(e.price || 0);
  });
  const grandRMDirect = relevant.filter(e => e.currency === 'RM').reduce((s,e) => s + toRM(e.price, e.currency), 0);

  let summaryHTML = `<div class="report-summary">
    <div class="stat-chip"><strong style="color:var(--bark)">RM ${grandRM.toFixed(2)}</strong>总实际花费（含运费）</div>
    ${grandCNY > 0 ? `<div class="stat-chip"><strong style="color:var(--moss)">¥ ${grandCNY.toFixed(2)}</strong>人民币部分 <span style="font-size:10px;color:#aaa">≈ RM ${(grandCNY * rate).toFixed(2)}</span></div>` : ''}
    ${grandRMDirect > 0 ? `<div class="stat-chip"><strong style="color:var(--moss)">RM ${grandRMDirect.toFixed(2)}</strong>马币部分</div>` : ''}
    <div class="stat-chip"><strong>${relevant.length}</strong>张（不含心愿款）</div>
  </div>`;

  let blocksHTML = Object.keys(brands).sort().map(brand => {
    const items = brands[brand];
    let brandTotalRM = 0;
    let brandHasCNY = false;
    let brandCNY = 0;

    const rows = items.map(e => {
      const fee = feeMap[e.id] || 0;
      const itemRM = toRM(e.price, e.currency);
      const totalItem = itemRM + fee;
      brandTotalRM += totalItem;
      const hasCNY = e.currency === '¥';
      if (hasCNY) { brandHasCNY = true; brandCNY += parseFloat(e.price || 0); }

      // price display
      const qty = e.qty || 1;
      const setPrice = e.setPrice ? `${e.currency} ${parseFloat(e.setPrice).toFixed(2)}/${qty}张` : (e.price ? `${e.currency} ${parseFloat(e.price).toFixed(2)}/张` : '—');
      const shipStr = fee > 0 ? `+RM ${fee.toFixed(2)}运费` : '—';

      // total per sheet
      let totalStr = '';
      let totalSubStr = '';
      if (hasCNY) {
        totalStr = `RM ${totalItem.toFixed(2)}`;
        totalSubStr = `¥ ${parseFloat(e.price||0).toFixed(2)} × ${rate} + 运费`;
      } else {
        totalStr = `RM ${totalItem.toFixed(2)}`;
      }

      return `<tr>
        <td class="td-ver">${esc(e.version||'—')}</td>
        <td class="td-price">${esc(setPrice)}</td>
        <td class="td-ship">${shipStr}</td>
        <td class="td-total">${totalStr}${totalSubStr ? `<span class="td-cny">${totalSubStr}</span>` : ''}</td>
      </tr>`;
    }).join('');

    const brandTotalDisplay = `RM ${brandTotalRM.toFixed(2)}` +
      (brandHasCNY ? ` (含¥${brandCNY.toFixed(2)} ≈RM ${(brandCNY*rate).toFixed(2)})` : '');

    return `<div class="report-brand-block">
      <div class="report-brand-hd">
        ${esc(brand)} <span class="grp-count">${items.length}张</span>
        <span class="rbd-total">${brandTotalDisplay}</span>
      </div>
      <div class="report-table-wrap">
        <table class="report-table">
          <thead><tr>
            <th>系列 / 版本</th>
            <th>购买价</th>
            <th>分摊运费</th>
            <th>实际到手价/张</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
  }).join('');

  el.innerHTML = summaryHTML + blocksHTML;
}

  // update card visual
  document.querySelectorAll('.card[data-eid]').forEach(c => {
    c.classList.toggle('selected', selectedEntryIds.has(c.dataset.eid));
  });
}

// ── OPEN NEW SHIPMENT ──────────────────────────
function openNewShipment(preSelected) {
  editingShipId = null;
  document.getElementById('shipModalTitle').textContent = '🚚 新建集运单';
  document.getElementById('shCarrier').value = '';
  document.getElementById('shTracking').value = '';
  document.getElementById('shStatus').value = 'pending';
  document.getElementById('shEta').value = '';
  document.getElementById('shNote').value = '';
  document.getElementById('shFee').value = '';
  document.getElementById('shFeeCur').value = 'RM';
  renderShipItemSelector(preSelected || []);
  document.getElementById('shipmentOverlay').classList.add('open');
}

function openMergeShipment() {
  if (selectedEntryIds.size === 0) { toast('请先选择贴纸', 'error'); return; }
  openNewShipment([...selectedEntryIds]);
  selectMode = false;
  selectedEntryIds.clear();
  document.getElementById('btnSelectMode').textContent = '☑ 选择贴纸';
  document.getElementById('btnMergeShip').style.display = 'none';
  document.getElementById('shipSelectCount').style.display = 'none';
  renderGrid();
}

function openEditShipment(id) {
  const s = shipments.find(x => x.id === id);
  if (!s) return;
  editingShipId = id;
  document.getElementById('shipModalTitle').textContent = '✏ 编辑集运单';
  document.getElementById('shCarrier').value = s.carrier || '';
  document.getElementById('shTracking').value = s.tracking || '';
  document.getElementById('shStatus').value = s.status || 'pending';
  document.getElementById('shEta').value = s.eta || '';
  document.getElementById('shNote').value = s.note || '';
  document.getElementById('shFee').value = s.fee || '';
  document.getElementById('shFeeCur').value = s.feeCur || 'RM';
  renderShipItemSelector(s.entryIds || []);
  document.getElementById('shipmentOverlay').classList.add('open');
}

function renderShipItemSelector(preSelected) {
  const sel = document.getElementById('shItemSelector');
  const eligible = entries.filter(e => ['ordered','transit','arrived'].includes(e.status));
  if (eligible.length === 0) {
    sel.innerHTML = '<div style="padding:14px;font-size:12px;color:#aaa;text-align:center">没有符合条件的贴纸（已下单/运输中/已到货）</div>';
    return;
  }
  sel.innerHTML = eligible.map(e => `
    <label class="shipment-item-row" style="cursor:pointer">
      <input type="checkbox" value="${e.id}" ${preSelected.includes(e.id)?'checked':''} style="accent-color:var(--moss);width:14px;height:14px;flex-shrink:0">
      <span class="sitem-brand">${esc(e.brand)}</span>
      <span class="sitem-version">${esc(e.version)}</span>
      <span style="font-size:10px;color:#aaa">${STATUS_LABEL[e.status]||e.status}</span>
    </label>
  `).join('');
}

function saveShipment() {
  const carrier = document.getElementById('shCarrier').value.trim();
  const tracking = document.getElementById('shTracking').value.trim();
  const status = document.getElementById('shStatus').value;
  const eta = document.getElementById('shEta').value;
  const note = document.getElementById('shNote').value.trim();
  const checked = [...document.getElementById('shItemSelector').querySelectorAll('input[type=checkbox]:checked')].map(c => c.value);

  const fee = document.getElementById('shFee').value || '';
  const feeCur = document.getElementById('shFeeCur').value;
  const shipment = {
    id: editingShipId || Date.now().toString(36) + Math.random().toString(36).slice(2,5),
    carrier, tracking, status, eta, note, fee, feeCur,
    entryIds: checked,
    createdAt: editingShipId ? (shipments.find(s=>s.id===editingShipId)?.createdAt || new Date().toISOString()) : new Date().toISOString(),
    updatedAt: new Date().toISOString()
  };

  if (editingShipId) {
    const idx = shipments.findIndex(s => s.id === editingShipId);
    shipments[idx] = shipment;
  } else {
    shipments.unshift(shipment);
  }

  // If shipped/arrived, update linked entries status
  if (status === 'arrived') {
    checked.forEach(eid => {
      const e = entries.find(x => x.id === eid);
      if (e && e.status !== 'arrived') e.status = 'arrived';
    });
  } else if (status === 'shipped') {
    checked.forEach(eid => {
      const e = entries.find(x => x.id === eid);
      if (e && e.status === 'ordered') e.status = 'transit';
    });
  }

  saveLocalAll();
  closeModal('shipmentOverlay');
  renderShipments();
  renderGrid();
  renderStats();
  toast(editingShipId ? '集运单已更新 ✓' : '集运单已创建 ✓', 'success');
}

function deleteShipment(id) {
  if (!confirm('确定删除这个集运单？')) return;
  shipments = shipments.filter(s => s.id !== id);
  saveLocalAll();
  renderShipments();
  toast('已删除');
}

// ── RENDER SHIPMENTS ───────────────────────────
function toRM(amount, currency) {
  const rate = parseFloat(localStorage.getItem('cny_to_rm') || '0.65');
  if (!amount || isNaN(parseFloat(amount))) return 0;
  return currency === '¥' ? parseFloat(amount) * rate : parseFloat(amount);
}

function renderShipments() {
  const grid = document.getElementById('shipmentGrid');
  if (shipments.length === 0) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">🚚</div><p>还没有集运单，点击「＋ 新建集运单」开始</p></div>';
    return;
  }
  grid.innerHTML = shipments.map(s => {
    const linked = entries.filter(e => s.entryIds && s.entryIds.includes(e.id));
    const statusColor = SHIP_STATUS_COLOR[s.status] || '#aaa';
    const statusLabel = SHIP_STATUS_LABEL[s.status] || s.status;

    // cost calculation
    const feeRM = toRM(s.fee, s.feeCur || 'RM');
    const feePerItem = linked.length > 0 && feeRM > 0 ? feeRM / linked.length : 0;
    const stickerTotalRM = linked.reduce((sum, e) => sum + toRM(e.price, e.currency), 0);
    const grandTotalRM = stickerTotalRM + feeRM;

    const feeLabel = s.fee ? `${s.feeCur || 'RM'} ${parseFloat(s.fee).toFixed(2)}` : '—';

    return `
    <div class="shipment-card">
      <div class="shipment-head">
        <div>
          <div class="shipment-title">${esc(s.carrier||'未填平台')}</div>
          <div class="shipment-sub">${s.tracking ? '📦 ' + esc(s.tracking) : '暂无追踪号'} · ${new Date(s.createdAt).toLocaleDateString('zh-CN')}</div>
        </div>
        <span class="status-badge" style="background:${statusColor}22;color:${statusColor};border:1px solid ${statusColor}44">${statusLabel}</span>
      </div>
      <div class="shipment-meta">
        <div class="meta-item"><div class="meta-label">📅 预计到达</div><div class="meta-value">${s.eta||'—'}</div></div>
        <div class="meta-item"><div class="meta-label">🚚 运费</div><div class="meta-value" style="font-weight:600;color:var(--sky)">${feeLabel}${feePerItem > 0 ? `<span style="font-size:10px;color:#aaa;font-weight:400;margin-left:4px">÷${linked.length}张 = RM ${feePerItem.toFixed(2)}/张</span>` : ''}</div></div>
        <div class="meta-item"><div class="meta-label">🏷 贴纸合计</div><div class="meta-value">RM ${stickerTotalRM.toFixed(2)}</div></div>
        <div class="meta-item"><div class="meta-label">💰 总花费</div><div class="meta-value" style="font-weight:700;color:var(--bark);font-size:13px">RM ${grandTotalRM.toFixed(2)}</div></div>
        ${s.note ? `<div class="meta-item" style="grid-column:1/-1"><div class="meta-label">📝 备注</div><div class="meta-value">${esc(s.note)}</div></div>` : ''}
      </div>
      ${linked.length > 0 ? `
      <div class="shipment-items">
        ${linked.map(e => {
          const itemRM = toRM(e.price, e.currency);
          const totalItem = itemRM + feePerItem;
          const priceStr = e.price ? `${e.currency} ${parseFloat(e.price).toFixed(2)}` : '—';
          const totalStr = totalItem > 0 ? `RM ${totalItem.toFixed(2)}` : '—';
          return `
          <div class="shipment-item-row">
            <span class="sitem-brand">${esc(e.brand)}</span>
            <span class="sitem-version">${esc(e.version)}</span>
            <span style="font-size:10px;color:var(--ink-soft);margin-left:auto">${priceStr}</span>
            ${feePerItem > 0 ? `<span style="font-size:10px;color:var(--bark);font-weight:600;margin-left:6px">到手 ${totalStr}</span>` : ''}
          </div>`;
        }).join('')}
      </div>` : ''}
      <div class="shipment-actions">
        <button class="btn btn-ghost btn-sm" data-ship-action="edit" data-ship-id="${s.id}">✏ 编辑</button>
        <button class="btn btn-danger btn-sm" data-ship-action="delete" data-ship-id="${s.id}">删除</button>
      </div>
    </div>
  `}).join('');
}

// ── SAVE ALL (entries + shipments) ────────────────
function saveLocalAll() {
  localStorage.setItem('sticker_entries', JSON.stringify(entries));
  localStorage.setItem('sticker_shipments', JSON.stringify(shipments));
  updateSyncStatus('warn', '有未同步的更改，3秒后自动保存…');
  if (settings.token && settings.owner && settings.repo) {
    clearTimeout(autoSaveTimer);
    autoSaveTimer = setTimeout(() => syncToGitHub(), 3000);
  }
}

document.getElementById('grid').addEventListener('click', function(ev) {
  const btn = ev.target.closest('[data-action]');
  if (!btn) return;
  const id = btn.dataset.id;
  if (selectMode) { toggleSelectEntry(id); return; }
  if (btn.dataset.action === 'edit') openEditModal(id);
  if (btn.dataset.action === 'delete') deleteEntry(id);
  if (btn.dataset.action === 'next') nextStatus(id);
});

document.getElementById('shipmentGrid').addEventListener('click', function(ev) {
  const btn = ev.target.closest('[data-ship-action]');
  if (!btn) return;
  const id = btn.dataset.shipId;
  if (btn.dataset.shipAction === 'edit') openEditShipment(id);
  if (btn.dataset.shipAction === 'delete') deleteShipment(id);
});

init();
</script>
</body>
</html>
